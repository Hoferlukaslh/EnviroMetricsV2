server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Servir l'application Flutter Web
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Ton API Go accessible via /api/
    location /api/ {
        proxy_pass http://api-go:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Ton API Python accessible via /api-python/
    location /api-python/ {
        proxy_pass http://api-python:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Rétrocompatibilité (redirigée vers l'API Go par défaut)
    location = /SendDB.php {
        proxy_pass http://api-go:80/SendDB.php$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /get_mesures.php {
        proxy_pass http://api-go:80/get_mesures.php$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /get_appareils.php {
        proxy_pass http://api-go:80/get_appareils.php$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- RÈGLE ANTI-CACHE ---
    location ~* ^/(index\.html|version\.json|flutter_service_worker\.js|main\.dart\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }
}
